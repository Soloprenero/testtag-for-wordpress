name: Release Package

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build assets
        run: npm run build

      - name: Create plugin zip
        run: |
          mkdir -p dist
          node -e "
            const fs = require('fs');
            const path = require('path');
            const m = JSON.parse(fs.readFileSync('release-manifest.json', 'utf8'));
            function walk(dir) {
              return fs.readdirSync(dir, { withFileTypes: true }).flatMap(e => {
                const full = path.join(dir, e.name);
                return e.isDirectory() ? walk(full) : [full];
              });
            }
            const files = (m.requiredFiles || []).flatMap(entry =>
              entry.endsWith('/') ? walk(entry.replace(/\/$/, '')) : [entry]
            );
            process.stdout.write(files.join('\n'));
          " | xargs -d '\n' zip dist/testtag-for-wordpress.zip

      - name: Validate packaged zip contents
        run: |
          set -euo pipefail

          zip_file_list="dist/zip-files.txt"
          manifest_file_list="dist/manifest-files.txt"

          unzip -Z1 dist/testtag-for-wordpress.zip \
            | sed 's#^\./##' \
            | sed '/^$/d' \
            | grep -v '/$' \
            | LC_ALL=C sort -u > "$zip_file_list"

          node -e "
            const fs = require('fs');
            const path = require('path');
            const m = JSON.parse(fs.readFileSync('release-manifest.json', 'utf8'));
            function walk(dir) {
              return fs.readdirSync(dir, { withFileTypes: true }).flatMap(e => {
                const full = path.join(dir, e.name);
                return e.isDirectory() ? walk(full) : [full];
              });
            }
            const files = (m.requiredFiles || []).flatMap(entry =>
              entry.endsWith('/') ? walk(entry.replace(/\/$/, '')) : [entry]
            );
            files.forEach(f => console.log(f));
          " | LC_ALL=C sort -u > "$manifest_file_list"

          missing_from_zip=$(comm -23 "$manifest_file_list" "$zip_file_list" || true)
          unexpected_in_zip=$(comm -13 "$manifest_file_list" "$zip_file_list" || true)

          if [ -n "$missing_from_zip" ]; then
            echo "Release zip is missing manifest files:"
            echo "$missing_from_zip"
            exit 1
          fi

          if [ -n "$unexpected_in_zip" ]; then
            echo "Release zip contains files not listed in manifest:"
            echo "$unexpected_in_zip"
            exit 1
          fi

          echo "Zip contents match manifest exactly."

      - name: Upload package artifact
        uses: actions/upload-artifact@v7
        with:
          name: testtag-for-wordpress
          path: dist/testtag-for-wordpress.zip

      - name: Attach zip to GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2.6.1
        with:
          files: dist/testtag-for-wordpress.zip
