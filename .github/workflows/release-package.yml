name: Release Package

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build assets
        run: npm run build

      - name: Create plugin zip
        run: |
          mkdir -p dist
          zip -r dist/testtag-for-wordpress.zip . \
            -x ".git/*" \
            -x ".github/*" \
            -x "node_modules/*" \
            -x ".history/*" \
            -x "dist/*" \
            -x "*.zip"

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: testtag-for-wordpress
          path: dist/testtag-for-wordpress.zip

      - name: Attach zip to GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/testtag-for-wordpress.zip
