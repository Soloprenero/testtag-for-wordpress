name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Install Playwright browser
        run: npx playwright install chromium --with-deps

      - name: Validate Playwright UI boot
        run: |
          set +e
          timeout -s TERM -k 5s 45s xvfb-run --auto-servernum npm run test:playwright:ui
          code=$?
          set -e
          # Exit code 124 means `timeout` terminated the process after 45s —
          # this is the expected outcome: Playwright UI booted successfully.
          if [ "$code" -ne 0 ] && [ "$code" -ne 124 ]; then
            exit "$code"
          fi

      - name: Validate PHP syntax
        run: |
          while IFS= read -r -d '' file; do
            php -l "$file"
          done < <(find . -type f -name "*.php" -print0)
