name: Screenshot Tests & Visual Regression

on:
  push:
    branches:
      - main
      - develop
  pull_request:
  schedule:
    # Run daily at 2 AM UTC to catch any visual regressions
    - cron: '0 2 * * *'

env:
  WORDPRESS_PORT: '18080'
  TEST_URL: http://localhost:18080
  NODE_VERSION: '24'

jobs:
  screenshots:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run screenshot tests
        run: npm run test:screenshots
        env:
          CI: true
          USE_DOCKER: true
          SKIP_WEB_SERVER: true

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshots
          path: tests/screenshots/
          retention-days: 30

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results.json
          retention-days: 30

      - name: Comment PR with screenshot links
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            function collectJsonFiles(dir, out = []) {
              if (!fs.existsSync(dir)) {
                return out;
              }
              for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
                const fullPath = path.join(dir, entry.name);
                if (entry.isDirectory()) {
                  collectJsonFiles(fullPath, out);
                } else if (entry.isFile() && entry.name.endsWith('.json')) {
                  out.push(fullPath);
                }
              }
              return out;
            }

            let testResults = null;
            let resultSource = 'none';

            const candidates = [];
            if (fs.existsSync('test-results.json')) {
              candidates.push('test-results.json');
            }
            candidates.push(...collectJsonFiles('test-results'));
            candidates.push(...collectJsonFiles('playwright-report'));

            const uniqueCandidates = [...new Set(candidates)]
              .filter(file => fs.existsSync(file))
              .sort((a, b) => fs.statSync(b).mtimeMs - fs.statSync(a).mtimeMs);

            for (const file of uniqueCandidates) {
              try {
                const parsed = JSON.parse(fs.readFileSync(file, 'utf8'));
                if (parsed && typeof parsed === 'object' && parsed.stats && typeof parsed.stats === 'object') {
                  testResults = parsed;
                  resultSource = file;
                  break;
                }
              } catch {
                // Ignore non-Playwright or malformed JSON files.
              }
            }

            const passed = testResults?.stats?.expected ?? 0;
            const failed = testResults?.stats?.unexpected ?? 0;
            const skipped = testResults?.stats?.skipped ?? 0;
            const sourceNote = resultSource === 'none'
              ? 'No JSON result file was found; counts may be incomplete.'
              : `Results source: ${resultSource}`;
            
            const body = `## 📸 Screenshot Test Results
            
            | Status | Count |
            |--------|-------|
            | ✅ Passed | ${passed} |
            | ❌ Failed | ${failed} |
            | ⏭️ Skipped | ${skipped} |

            _${sourceNote}_
            
            📊 Screenshots available in artifacts: [Playwright Report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
            
            [View Screenshots Artifact](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
