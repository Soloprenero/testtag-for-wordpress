name: Screenshot Tests & Visual Regression

on:
  push:
    branches:
      - main
      - develop
  pull_request:
  schedule:
    # Run daily at 2 AM UTC to catch any visual regressions
    - cron: '0 2 * * *'

env:
  WORDPRESS_PORT: '18080'
  TEST_URL: http://localhost:18080
  NODE_VERSION: '24'

jobs:
  screenshots:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run end-to-end tests
        run: npm run test:screenshots:default
        env:
          CI: true
          USE_DOCKER: true
          SKIP_WEB_SERVER: true
      
      - name: Run custom attribute tests
        run: npm run test:screenshots:data-cy
        env:
          CI: true
          USE_DOCKER: true
          SKIP_WEB_SERVER: true

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshots
          path: tests/screenshots/
          retention-days: 30

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results.json
          retention-days: 30
