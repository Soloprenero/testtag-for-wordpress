name: Plugin Installation Test

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  plugin-installation:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      # Port used by the clean WordPress container started in this job.
      INSTALL_TEST_PORT: 8081
      TEST_URL: http://localhost:8081

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Install Playwright browser
        run: npx playwright install chromium --with-deps

      - name: Build plugin assets
        run: npm run build

      - name: Create plugin zip
        run: |
          mkdir -p dist
          node -e "
            const fs = require('fs');
            const m = JSON.parse(fs.readFileSync('release-manifest.json', 'utf8'));
            process.stdout.write((m.requiredFiles || []).join('\n'));
          " | xargs -d '\n' zip dist/testtag-for-wp.zip

      - name: Start clean WordPress (no plugin pre-installed)
        run: |
          INSTALL_TEST_PORT=${{ env.INSTALL_TEST_PORT }} \
            docker compose -f docker-compose.install-test.yml up -d

      - name: Wait for WordPress to be healthy
        run: |
          set -euo pipefail
          deadline=$(( $(date +%s) + 120 ))
          until curl -sf http://localhost:${{ env.INSTALL_TEST_PORT }}/wp-login.php > /dev/null 2>&1; do
            if [ "$(date +%s)" -ge "$deadline" ]; then
              echo "WordPress did not become healthy within 120 s."
              docker compose -f docker-compose.install-test.yml logs wordpress
              exit 1
            fi
            sleep 3
          done
          echo "WordPress is ready."

      - name: Run plugin zip installation test
        run: |
          npx playwright test --config=playwright.install-test.config.ts

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-install
          path: playwright-report-install/
          retention-days: 7

      - name: Stop clean WordPress
        if: always()
        run: docker compose -f docker-compose.install-test.yml down -v
